<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480">
  <title>CrepesALatte — Service Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav glass-nav animate-fade-in">
    <div class="nav-inner">
      <div class="brand">
        <div class="brand-icon" style="display: flex; align-items: center; justify-content: center;">
          <img src="icons/icon48.png" width="18" height="18" alt="CrepesALatte" style="border-radius: 4px;" />
        </div>
        <span class="brand-name">CrepesALatte</span>
      </div>

      <form id="search-form" class="search-form">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input id="search-input" type="search" placeholder="Paste deal ID or name…" autocomplete="off">
        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </form>

      <div class="nav-actions">
        <div id="active-deal-badge" class="active-deal hidden">
          <div class="deal-info">
            <span class="deal-label">Active Deal</span>
            <span id="deal-name-display" class="deal-name"></span>
          </div>
          <button id="clear-deal-btn" class="icon-btn" aria-label="Clear deal">
            <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
              <path d="M5.28 4.22a.75.75 0 00-1.06 1.06L6.94 8l-2.72 2.72a.75.75 0 101.06 1.06L8 9.06l2.72 2.72a.75.75 0 101.06-1.06L9.06 8l2.72-2.72a.75.75 0 00-1.06-1.06L8 6.94 5.28 4.22z"/>
            </svg>
          </button>
        </div>
        <button id="add-service-btn" class="btn-primary btn-shine" disabled>
          <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
            <path d="M8.75 3.75a.75.75 0 00-1.5 0v3.5h-3.5a.75.75 0 000 1.5h3.5v3.5a.75.75 0 001.5 0v-3.5h3.5a.75.75 0 000-1.5h-3.5v-3.5z"/>
          </svg>
          <span>Add service</span>
        </button>
        <button id="close-sidebar-btn" class="icon-btn hidden" aria-label="Close sidebar">
          <svg viewBox="0 0 16 16" fill="currentColor" width="16" height="16">
            <path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header animate-fade-in">
      <h1>Service Configuration</h1>
      <p id="panel-note" class="panel-note">Pick a deal to get started.</p>
    </div>

    <div id="services-container">
      <div id="empty-state" class="empty-state animate-fade-in-delay-1">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#795c51" stroke-width="1.5" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h3 id="empty-title">Select a deal to begin</h3>
        <p id="empty-subtitle">Use the search bar above to find and select a deal.</p>
      </div>
    </div>

    <div class="footer-meta">
      <span>CrepesALatte Service Studio</span>
      <span>Secure Configuration Environment</span>
    </div>
  </main>

  <!-- Service Card Template -->
  <template id="service-card-template">
    <article class="service-card card-lift">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#795c51" stroke-width="1.5" width="20" height="20">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.992l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </div>
          <div>
            <div class="card-title-row">
              <h3 class="card-title"></h3>
              <span class="card-status"></span>
            </div>
            <p class="card-note"></p>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-outline btn-delete">Delete</button>
          <button class="btn-primary btn-shine btn-save">Save service</button>
        </div>
      </div>
      <div class="card-body">
        <div class="form-grid"></div>
      </div>
    </article>
  </template>

  <!-- Loading State Template -->
  <template id="loading-template">
    <div class="loading-state animate-shimmer">Loading services…</div>
  </template>

  <script src="service-catalog.js"></script>
  <script src="popup.js"></script>
</body>
</html>
